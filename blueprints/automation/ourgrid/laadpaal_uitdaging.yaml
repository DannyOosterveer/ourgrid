blueprint:
  name: OurGrid - Laadpaal pauzeren tijdens uitdaging
  description: >
    Accepteert automatisch een OurGrid-uitdaging, zet de laadstroom op 0 ampère
    bij de starttijd en herstelt deze naar de gewenste waarde na afloop.
  domain: automation
  author: OurGrid
  input:
    charger_current_entity:
      name: Laadstroom entiteit
      description: >
        De number entiteit waarmee je de laadstroom van je laadpaal instelt
        (bijv. number.alfen_laadpaal_max_station_current).
      selector:
        entity:
          domain: number
    normal_current:
      name: Laadstroom na uitdaging (ampère)
      description: >
        Het aantal ampère dat na de uitdaging weer wordt ingesteld.
      default: 16
      selector:
        number:
          min: 0
          max: 32
          unit_of_measurement: A
          mode: slider

trigger:
  - platform: state
    entity_id: binary_sensor.ourgrid_challenge_status
    to: "on"
    id: available
  - platform: time
    at: sensor.ourgrid_challenge_start
    id: start
  - platform: time
    at: sensor.ourgrid_challenge_end
    id: stop

action:
  - choose:
      - conditions:
          - condition: trigger
            id: available
        sequence:
          - service: button.press
            target:
              entity_id: button.ourgrid_challenge_join_button
      - conditions:
          - condition: trigger
            id: start
        sequence:
          - service: number.set_value
            target:
              entity_id: !input charger_current_entity
            data:
              value: 0
      - conditions:
          - condition: trigger
            id: stop
        sequence:
          - service: number.set_value
            target:
              entity_id: !input charger_current_entity
            data:
              value: !input normal_current

mode: single
